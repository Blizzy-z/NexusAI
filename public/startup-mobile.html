<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#000000" />
  <link rel="icon" type="image/x-icon" href="/nexusai.ico" />
  <link rel="apple-touch-icon" href="/icon-180x180.png" />
  <title>NexusAI Startup Mobile</title>
  <style>
    :root {
      --safe-t: env(safe-area-inset-top);
      --safe-b: env(safe-area-inset-bottom);
      --safe-l: env(safe-area-inset-left);
      --safe-r: env(safe-area-inset-right);
      --bg: #030409;
      --panel: #0c1020;
      --border: rgba(148, 163, 184, 0.24);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --ok: #10b981;
      --warn: #f59e0b;
      --err: #ef4444;
      --primary: #6366f1;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      margin: 0;
      height: 100%;
      background: linear-gradient(180deg, #0b1027 0%, #04060d 35%, #020307 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", Inter, system-ui, sans-serif;
      overflow: hidden;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100%;
      padding-top: var(--safe-t);
      padding-bottom: calc(8px + var(--safe-b));
      padding-left: max(10px, var(--safe-l));
      padding-right: max(10px, var(--safe-r));
      max-width: 100vw;
      overflow: hidden;
    }

    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 8px 2px 10px;
    }

    .title {
      font-size: 1rem;
      font-weight: 760;
      letter-spacing: 0.2px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.75rem;
      margin-top: 2px;
    }

    .tiny-link {
      text-decoration: none;
      color: #c7d2fe;
      background: rgba(99, 102, 241, 0.16);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 7px 10px;
      font-size: 0.72rem;
      font-weight: 650;
      white-space: nowrap;
    }

    .status {
      border: 1px solid var(--border);
      background: rgba(15, 23, 42, 0.7);
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .status.ok {
      border-color: rgba(16, 185, 129, 0.45);
      color: #6ee7b7;
      background: rgba(16, 185, 129, 0.12);
    }

    .status.error {
      border-color: rgba(239, 68, 68, 0.45);
      color: #fca5a5;
      background: rgba(239, 68, 68, 0.12);
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 8px;
    }

    button {
      border: 1px solid var(--border);
      border-radius: 10px;
      color: #fff;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      padding: 10px 10px;
      font-size: 0.8rem;
      font-weight: 650;
    }

    button.alt { background: #16213a; }
    button.warn { background: #78350f; }

    .cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 8px;
    }

    .card {
      background: rgba(15, 20, 45, 0.88);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px;
    }

    .k {
      color: var(--muted);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.7px;
    }

    .v {
      margin-top: 4px;
      font-size: 1rem;
      font-weight: 730;
    }

    .scroll {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      display: grid;
      gap: 8px;
      padding-right: 2px;
    }

    .panel {
      background: rgba(12, 16, 32, 0.88);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px;
    }

    .panel h2 {
      margin: 0 0 8px;
      font-size: 0.88rem;
      font-weight: 700;
    }

    .row {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #0c1226;
      padding: 8px;
      margin-bottom: 6px;
    }

    .row:last-child { margin-bottom: 0; }

    .row-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 4px;
    }

    .label { font-size: 0.82rem; font-weight: 650; }
    .sub { color: var(--muted); font-size: 0.74rem; line-height: 1.35; }

    .pill {
      border: 1px solid var(--border);
      border-radius: 999px;
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      padding: 2px 7px;
    }

    .pill.ok { color: #6ee7b7; border-color: rgba(16,185,129,.5); background: rgba(16,185,129,.12); }
    .pill.warn { color: #fcd34d; border-color: rgba(245,158,11,.5); background: rgba(245,158,11,.12); }
    .pill.error { color: #fca5a5; border-color: rgba(239,68,68,.5); background: rgba(239,68,68,.12); }

    .pill.pending, .pill.queued {
      color: #cbd5e1;
      border-color: rgba(148,163,184,.5);
      background: rgba(148,163,184,.12);
    }

    .pill.running, .pill.new, .pill.messaged, .pill.responded, .pill.qualified, .pill.closed, .pill.done {
      color: #c7d2fe;
      border-color: rgba(99,102,241,.45);
      background: rgba(99,102,241,.18);
    }

    .inline {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 6px;
      align-items: center;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #11193a;
      color: var(--text);
      padding: 8px 9px;
      font-size: 0.8rem;
    }

    textarea { min-height: 66px; resize: vertical; }

    .form {
      display: grid;
      gap: 6px;
    }

    .outreach-actions {
      display: grid;
      gap: 6px;
      margin-top: 8px;
    }

    pre {
      margin: 0;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #070b19;
      color: #d1d5db;
      font-size: 0.73rem;
      line-height: 1.4;
      padding: 9px;
      white-space: pre-wrap;
      max-height: 220px;
      overflow: auto;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="top">
      <div>
        <div class="title">Startup Engine Mobile</div>
        <div class="subtitle">nexusais.app/startup/mobile</div>
      </div>
      <div style="display:flex; gap:6px;">
        <a class="tiny-link" href="/startup/results">Results</a>
        <a class="tiny-link" href="/startup">Desktop</a>
      </div>
    </div>

    <div id="status" class="status">Loading state...</div>

    <div class="actions">
      <button id="runCheck">Run check</button>
      <button id="runBrowserQuick" class="warn">Run browser</button>
      <button id="genPlan" class="alt">Generate AI plan</button>
      <button id="saveSettings" class="alt">Save settings</button>
    </div>

    <div class="cards" id="stats"></div>

    <div class="scroll">
      <section class="panel">
        <h2>Objective</h2>
        <textarea id="objective">Generate today's high-impact revenue plan.</textarea>
      </section>

      <section class="panel">
        <h2>Checks</h2>
        <div id="checks"></div>
      </section>

      <section class="panel">
        <h2>Tasks</h2>
        <div id="tasks"></div>
      </section>

      <section class="panel">
        <h2>Add lead</h2>
        <form id="leadForm" class="form">
          <input id="leadName" placeholder="Lead name" required />
          <input id="leadEmail" type="email" placeholder="Lead email" required />
          <input id="leadPhone" placeholder="Lead phone (optional)" />
          <select id="leadHasWebsite">
            <option value="">Website unknown</option>
            <option value="false">No website</option>
            <option value="true">Has website</option>
          </select>
          <input id="leadNiche" placeholder="Niche (optional)" />
          <input id="leadValue" type="number" min="0" step="1" placeholder="Deal value USD" />
          <button type="submit">Add lead</button>
        </form>
      </section>

      <section class="panel">
        <h2>Leads</h2>
        <div id="leads"></div>
      </section>

      <section class="panel">
        <h2>Settings</h2>
        <div class="form">
          <input id="offerName" placeholder="Offer name" />
          <input id="niche" placeholder="Niche" />
          <input id="targetUsd" type="number" min="500" step="100" placeholder="Target MRR" />
          <input id="starterUsd" type="number" min="0" step="10" placeholder="Starter USD" />
          <input id="growthUsd" type="number" min="0" step="10" placeholder="Growth USD" />
          <input id="scaleUsd" type="number" min="0" step="10" placeholder="Scale USD" />
          <input id="intervalMins" type="number" min="1" step="1" placeholder="Interval minutes" />
          <select id="loopEnabled">
            <option value="true">Auto loop on</option>
            <option value="false">Auto loop off</option>
          </select>
        </div>
      </section>

      <section class="panel">
        <h2>Founder + browser agent</h2>
        <div class="form" id="businessForm">
          <input id="businessNiche" placeholder="Niche" />
          <input id="businessOfferName" placeholder="Offer name" />
          <input id="businessMonthlyTargetGbp" type="number" min="100" step="50" placeholder="Target £/month" />
          <input id="businessMonthlyPriceGbp" type="number" min="50" step="10" placeholder="Monthly price £" />
          <input id="businessSetupFeeGbp" type="number" min="0" step="10" placeholder="Setup fee £" />
          <input id="businessClientsNeeded" type="number" min="1" step="1" placeholder="Clients needed" />
          <textarea id="businessOfferSummary" placeholder="Offer summary"></textarea>
          <select id="browserEnabled">
            <option value="true">Browser agent enabled</option>
            <option value="false">Browser agent disabled</option>
          </select>
          <select id="browserHeadless">
            <option value="true">Headless on</option>
            <option value="false">Headless off</option>
          </select>
          <select id="browserSearchEngine">
            <option value="duckduckgo">DuckDuckGo</option>
            <option value="google">Google</option>
            <option value="bing">Bing</option>
          </select>
          <input id="browserMaxActionsPerRun" type="number" min="5" max="40" placeholder="Max actions/run" />
          <input id="browserHumanDelayMinMs" type="number" min="200" max="8000" placeholder="Min delay ms" />
          <input id="browserHumanDelayMaxMs" type="number" min="200" max="12000" placeholder="Max delay ms" />
          <select id="googlePlacesEnabled">
            <option value="true">Google Places enabled</option>
            <option value="false">Google Places disabled</option>
          </select>
          <input id="googlePlacesLocation" placeholder="Google Places location (e.g. London, UK)" />
          <input id="googlePlacesMaxResults" type="number" min="1" max="20" placeholder="Google Places max results" />
          <input id="googlePlacesApiKey" type="password" placeholder="Google Places API key (leave empty to keep)" />
          <button id="saveBusiness" type="button" class="alt">Save founder + browser</button>
          <button id="runBrowserAgentNow" type="button">Run browser agent now</button>
        </div>
      </section>

      <section class="panel">
        <h2>Loop memory</h2>
        <div id="loopMemory"></div>
      </section>

      <section class="panel">
        <h2>Live calling (Vapi)</h2>
        <div class="form" id="callingForm">
          <select id="callingEnabled">
            <option value="true">Calling enabled</option>
            <option value="false">Calling disabled</option>
          </select>
          <input id="vapiAssistantId" placeholder="Vapi assistant ID" />
          <input id="vapiPhoneNumberId" placeholder="Vapi phone number ID" />
          <input id="vapiApiKey" type="password" placeholder="Vapi API key (leave empty to keep)" />
          <input id="callingDefaultCountryCode" placeholder="Default country code (e.g. GB)" />
          <input id="callingBatchSizePerRun" type="number" min="1" max="50" placeholder="Call batch size per run" />
          <input id="callingMinMinutesBetweenCalls" type="number" min="0" max="60" placeholder="Minutes between calls" />
          <input id="callingMinHoursBetweenCalls" type="number" min="1" max="720" placeholder="Min hours between calls" />
          <select id="callingFallbackToEmailWhenNoPhone">
            <option value="true">Email fallback enabled</option>
            <option value="false">Email fallback disabled</option>
          </select>
          <input id="callingAssistantDescription" placeholder="Assistant description" />
          <input id="callingFirstMessage" placeholder="First message" />
          <textarea id="callingSystemPrompt" placeholder="System prompt"></textarea>
          <textarea id="callingScriptTemplate" placeholder="Call script template"></textarea>
          <button id="saveCalling" type="button" class="alt">Save calling config</button>
        </div>
        <div class="outreach-actions">
          <button id="runCallingNow" type="button">Run calling now</button>
        </div>
      </section>

      <section class="panel">
        <h2>Live outreach (SMTP)</h2>
        <div class="form" id="outreachForm">
          <select id="outreachEnabled">
            <option value="true">Enabled</option>
            <option value="false">Disabled</option>
          </select>
          <input id="fromName" placeholder="From name" />
          <input id="fromEmail" type="email" placeholder="From email" />
          <input id="replyTo" type="email" placeholder="Reply-to (optional)" />
          <input id="smtpHost" placeholder="SMTP host" />
          <input id="smtpPort" type="number" min="1" max="65535" placeholder="SMTP port" />
          <input id="smtpUser" placeholder="SMTP user/login" />
          <input id="smtpPassword" type="password" placeholder="SMTP password (leave empty to keep)" />
          <select id="smtpSecure">
            <option value="false">TLS secure off</option>
            <option value="true">TLS secure on</option>
          </select>
          <input id="batchSizePerRun" type="number" min="1" max="50" placeholder="Batch size per run" />
          <input id="minMinutesBetweenSends" type="number" min="0" max="60" placeholder="Minutes between emails (e.g. 2)" />
          <input id="minHoursBetweenMessages" type="number" min="1" max="720" placeholder="Min hours between messages" />
          <select id="autoReplyEnabled">
            <option value="true">Auto-reply enabled</option>
            <option value="false">Auto-reply disabled</option>
          </select>
          <input id="autoReplyCooldownHours" type="number" min="1" max="168" placeholder="Auto-reply cooldown hours" />
          <input id="autoReplySubjectTemplate" placeholder="Auto-reply subject (e.g. Re: {subject})" />
          <input id="subjectTemplate" placeholder="Subject template (e.g. Quick idea for {business})" />
          <textarea id="autoReplyTemplate" placeholder="Auto-reply body template"></textarea>
          <button id="saveOutreach" type="button" class="alt">Save outreach config</button>
        </div>
        <div class="outreach-actions">
          <button id="sendOutreachNow" type="button">Send outreach now</button>
          <button id="runAutoReplyNow" type="button">Run auto-reply now</button>
          <button id="enrichLeadsNow" type="button">Enrich lead reviews/info</button>
        </div>
      </section>

      <section class="panel">
        <h2>Reply inbox + intake</h2>
        <div class="form" id="replyIntakeForm">
          <input id="replyFromEmail" type="email" placeholder="Reply from email" />
          <input id="replySubject" placeholder="Reply subject" />
          <textarea id="replyText" placeholder="Reply message text"></textarea>
          <button id="captureReply" type="button" class="alt">Capture reply + auto-reply</button>
        </div>
        <div id="replyInbox" style="margin-top:10px;"></div>
      </section>

      <section class="panel">
        <h2>Delivery logs</h2>
        <div id="deliveries"></div>
      </section>

      <section class="panel">
        <h2>AI plan output</h2>
        <pre id="planOut">No plan generated yet.</pre>
      </section>

      <section class="panel">
        <h2>Logs</h2>
        <div id="logs"></div>
      </section>
    </div>
  </div>

  <script>
    const LEAD_STATUSES = ["new", "messaged", "responded", "qualified", "closed"];
    let state = null;
    let planText = "";

    const $ = (id) => document.getElementById(id);

    function esc(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function money(v) { return "$" + Number(v || 0).toLocaleString(); }
    function when(ts) { try { return ts ? new Date(ts).toLocaleString() : "n/a"; } catch { return "n/a"; } }

    function setStatus(message, type) {
      const el = $("status");
      el.textContent = message;
      el.className = "status" + (type ? " " + type : "");
    }

    async function api(url, options = {}) {
      const res = await fetch(url, {
        headers: { "Content-Type": "application/json" },
        ...options,
      });
      const body = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(body.error || (res.status + " " + res.statusText));
      return body;
    }

    function renderStats() {
      if (!state) return;
      const s = state.stats || {};
      const cards = [
        ["Outreach", s.outreachSent || 0],
        ["Replies", s.replies || 0],
        ["Closed", s.closedDeals || 0],
        ["MRR", money(s.mrrUsd || 0)],
      ];
      $("stats").innerHTML = cards.map(([k, v]) => (
        `<div class="card"><div class="k">${esc(k)}</div><div class="v">${esc(v)}</div></div>`
      )).join("");
    }

    function renderChecks() {
      const checks = state?.checks || [];
      $("checks").innerHTML = checks.map((c) => `
        <div class="row">
          <div class="row-head">
            <div class="label">${esc(c.label)}</div>
            <span class="pill ${esc(c.status)}">${esc(c.status)}</span>
          </div>
          <div class="sub">${esc(c.detail || "")}</div>
        </div>
      `).join("") || `<div class="row"><div class="sub">No checks yet.</div></div>`;
    }

    function renderTasks() {
      const tasks = state?.tasks || [];
      $("tasks").innerHTML = tasks.map((t) => `
        <div class="row">
          <div class="row-head">
            <div class="label">${esc(t.title)}</div>
            <span class="pill ${esc(t.status)}">${esc(t.status)}</span>
          </div>
          <div class="sub">${esc(t.detail || "")}</div>
        </div>
      `).join("") || `<div class="row"><div class="sub">No tasks yet.</div></div>`;
    }

    function renderLeads() {
      const leads = state?.leads || [];
      $("leads").innerHTML = leads.slice(0, 24).map((l) => `
        <div class="row">
          <div class="inline">
            <div>
              <div class="label">${esc(l.name)}</div>
              <div class="sub">${esc(l.email)}${l.phone ? ` | ${esc(l.phone)}` : ""} | ${esc(money(l.valueUsd || 0))}</div>
              <div class="sub">${l.hasWebsite === false ? "No website" : l.hasWebsite === true ? "Has website" : "Website unknown"}</div>
              <div class="sub">${esc(l.reviewSummary || l.companyInfo || "No enrichment yet")}</div>
              ${l.avgRating ? `<div class="sub">Rating: ${esc(String(l.avgRating))}${l.reviewCount ? ` (${esc(String(l.reviewCount))} reviews)` : ""}</div>` : ""}
              ${l.reviewSource ? `<div class="sub">Source: ${esc(l.reviewSource)}</div>` : ""}
            </div>
            <select data-lead-status="${esc(l.id)}">
              ${LEAD_STATUSES.map((status) => `<option value="${status}" ${status === l.status ? "selected" : ""}>${status}</option>`).join("")}
            </select>
          </div>
        </div>
      `).join("") || `<div class="row"><div class="sub">No leads yet.</div></div>`;
    }

    function renderLogs() {
      const logs = state?.logs || [];
      $("logs").innerHTML = logs.slice(0, 24).map((l) => `
        <div class="row">
          <div class="row-head">
            <div class="label">${esc(l.level.toUpperCase())}</div>
            <div class="sub">${esc(when(l.ts))}</div>
          </div>
          <div class="sub">${esc(l.msg)}</div>
        </div>
      `).join("") || `<div class="row"><div class="sub">No logs yet.</div></div>`;
    }

    function renderDeliveries() {
      const deliveries = state?.deliveries || [];
      $("deliveries").innerHTML = deliveries.slice(0, 24).map((d) => `
        <div class="row">
          <div class="row-head">
            <div class="label">${esc(d.leadEmail || d.leadPhone || "unknown")}</div>
            <span class="pill ${esc(d.status === "sent" ? "ok" : "error")}">${esc(d.status || "unknown")}</span>
          </div>
          <div class="sub">${esc((d.kind || "outreach").toUpperCase())}</div>
          <div class="sub">${esc(d.subject || "")}</div>
          <div class="sub">${esc(d.provider || "")} | ${esc(when(d.ts))}</div>
          ${d.error ? `<div class="sub" style="color:#fca5a5;">${esc(d.error)}</div>` : ""}
        </div>
      `).join("") || `<div class="row"><div class="sub">No delivery attempts yet.</div></div>`;
    }

    function renderReplyInbox() {
      const replies = state?.repliesInbox || [];
      $("replyInbox").innerHTML = replies.slice(0, 20).map((r) => `
        <div class="row">
          <div class="row-head">
            <div class="label">${esc(r.fromEmail || "unknown")}</div>
            <span class="pill ${esc(r.autoReplyStatus === "sent" ? "ok" : r.autoReplyStatus === "failed" ? "error" : "warn")}">${esc(r.autoReplyStatus || "queued")}</span>
          </div>
          <div class="sub">${esc(r.subject || "(no subject)")}</div>
          <div class="sub">${esc((r.text || "").slice(0, 220))}</div>
          <div class="sub">${esc(when(r.ts))}</div>
          ${r.autoReplyError ? `<div class="sub" style="color:#fca5a5;">${esc(r.autoReplyError)}</div>` : ""}
        </div>
      `).join("") || `<div class="row"><div class="sub">No captured replies yet.</div></div>`;
    }

    function renderLoopMemory() {
      const memory = state?.loopMemory || [];
      $("loopMemory").innerHTML = memory.slice(0, 16).map((m) => `
        <div class="row">
          <div class="row-head">
            <div class="label">${esc(m.currentGoal || "goal")}</div>
            <span class="pill ${esc(m.status === "ok" ? "ok" : m.status === "warn" ? "warn" : "error")}">${esc(m.status || "n/a")}</span>
          </div>
          <div class="sub"><strong>Plan:</strong> ${esc(m.plan || "")}</div>
          <div class="sub"><strong>Action:</strong> ${esc(m.action || "")}</div>
          <div class="sub"><strong>Expected:</strong> ${esc(m.expectedResult || "")}</div>
          <div class="sub"><strong>Observed:</strong> ${esc(m.observation || "")}</div>
          <div class="sub"><strong>Improve:</strong> ${esc(m.improvement || "")}</div>
        </div>
      `).join("") || `<div class="row"><div class="sub">No loop memory entries yet.</div></div>`;
    }

    function renderPlan() { $("planOut").textContent = planText || "No plan generated yet."; }

    function renderSettings() {
      if (!state) return;
      $("offerName").value = state.offerName || "";
      $("niche").value = state.niche || "";
      $("targetUsd").value = state.monthlyTargetUsd || 0;
      $("starterUsd").value = state.pricingUsd?.starter ?? 0;
      $("growthUsd").value = state.pricingUsd?.growth ?? 0;
      $("scaleUsd").value = state.pricingUsd?.scale ?? 0;
      $("intervalMins").value = state.automationIntervalMinutes || 10;
      $("loopEnabled").value = String(Boolean(state.autoLoopEnabled));
      const calling = state.calling || {};
      $("callingEnabled").value = String(calling.enabled !== false);
      $("vapiAssistantId").value = calling.vapiAssistantId || "";
      $("vapiPhoneNumberId").value = calling.vapiPhoneNumberId || "";
      $("vapiApiKey").value = "";
      $("callingDefaultCountryCode").value = calling.defaultCountryCode || "GB";
      $("callingBatchSizePerRun").value = calling.batchSizePerRun || 5;
      $("callingMinMinutesBetweenCalls").value = Number.isFinite(calling.minMinutesBetweenCalls) ? calling.minMinutesBetweenCalls : 2;
      $("callingMinHoursBetweenCalls").value = calling.minHoursBetweenCalls || 24;
      $("callingFallbackToEmailWhenNoPhone").value = String(calling.fallbackToEmailWhenNoPhone !== false);
      $("callingAssistantDescription").value = calling.assistantDescription || "";
      $("callingFirstMessage").value = calling.firstMessage || "";
      $("callingSystemPrompt").value = calling.systemPrompt || "";
      $("callingScriptTemplate").value = calling.scriptTemplate || "";
      const outreach = state.outreach || {};
      $("outreachEnabled").value = String(Boolean(outreach.enabled));
      $("fromName").value = outreach.fromName || "";
      $("fromEmail").value = outreach.fromEmail || "";
      $("replyTo").value = outreach.replyTo || "";
      $("smtpHost").value = outreach.smtpHost || "";
      $("smtpPort").value = outreach.smtpPort || 587;
      $("smtpUser").value = outreach.smtpUser || "";
      $("smtpPassword").value = "";
      $("smtpSecure").value = String(Boolean(outreach.smtpSecure));
      $("batchSizePerRun").value = outreach.batchSizePerRun || 5;
      $("minMinutesBetweenSends").value = Number.isFinite(outreach.minMinutesBetweenSends) ? outreach.minMinutesBetweenSends : 2;
      $("minHoursBetweenMessages").value = outreach.minHoursBetweenMessages || 24;
      $("subjectTemplate").value = outreach.subjectTemplate || "Quick idea for {business}";
      $("autoReplyEnabled").value = String(outreach.autoReplyEnabled !== false);
      $("autoReplyCooldownHours").value = outreach.autoReplyCooldownHours || 12;
      $("autoReplySubjectTemplate").value = outreach.autoReplySubjectTemplate || "Re: {subject}";
      $("autoReplyTemplate").value = outreach.autoReplyTemplate || "";
      const business = state.business || {};
      const browser = state.browserAgent || {};
      $("businessNiche").value = business.niche || "";
      $("businessOfferName").value = business.offerName || "";
      $("businessMonthlyTargetGbp").value = business.monthlyTargetGbp || 1000;
      $("businessMonthlyPriceGbp").value = business.monthlyPriceGbp || 299;
      $("businessSetupFeeGbp").value = business.setupFeeGbp || 199;
      $("businessClientsNeeded").value = business.clientsNeeded || 4;
      $("businessOfferSummary").value = business.offerSummary || "";
      $("browserEnabled").value = String(Boolean(browser.enabled));
      $("browserHeadless").value = String(Boolean(browser.headless));
      $("browserSearchEngine").value = browser.searchEngine || "duckduckgo";
      $("browserMaxActionsPerRun").value = browser.maxActionsPerRun || 20;
      $("browserHumanDelayMinMs").value = browser.humanDelayMinMs || 900;
      $("browserHumanDelayMaxMs").value = browser.humanDelayMaxMs || 2200;
      $("googlePlacesEnabled").value = String(Boolean(browser.googlePlacesEnabled));
      $("googlePlacesLocation").value = browser.googlePlacesLocation || "London, UK";
      $("googlePlacesMaxResults").value = browser.googlePlacesMaxResults || 8;
      $("googlePlacesApiKey").value = "";
    }

    function renderAll() {
      renderStats();
      renderChecks();
      renderTasks();
      renderLeads();
      renderLogs();
      renderDeliveries();
      renderReplyInbox();
      renderLoopMemory();
      renderSettings();
      renderPlan();
    }

    async function refresh(silent) {
      try {
        state = await api("/api/startup/state");
        renderAll();
        if (!silent) {
          setStatus("Synced. Next run: " + when(state.nextRunAt), "ok");
        }
      } catch (err) {
        setStatus("Load failed: " + err.message, "error");
      }
    }

    async function saveSettings() {
      await api("/api/startup/state", {
        method: "POST",
        body: JSON.stringify({
          offerName: $("offerName").value.trim(),
          niche: $("niche").value.trim(),
          monthlyTargetUsd: Number($("targetUsd").value || 0),
          autoLoopEnabled: $("loopEnabled").value === "true",
          automationIntervalMinutes: Number($("intervalMins").value || 10),
          pricingUsd: {
            starter: Number($("starterUsd").value || 0),
            growth: Number($("growthUsd").value || 0),
            scale: Number($("scaleUsd").value || 0),
          },
        }),
      });
    }

    $("runCheck").addEventListener("click", async () => {
      try {
        setStatus("Running check...", "");
        await api("/api/startup/run-check", { method: "POST", body: JSON.stringify({ reason: "mobile-dashboard" }) });
        await refresh(true);
        setStatus("Check complete.", "ok");
      } catch (err) {
        setStatus("Check failed: " + err.message, "error");
      }
    });

    $("runBrowserQuick").addEventListener("click", async () => {
      try {
        setStatus("Running browser agent...", "");
        await api("/api/startup/browser-agent/run", {
          method: "POST",
          body: JSON.stringify({
            reason: "mobile-quick-browser-run",
            goal: `Reach £${Number($("businessMonthlyTargetGbp").value || 1000)}/month fast`,
            plan: "Find real niche leads and extract public contact opportunities",
          }),
        });
        await refresh(true);
        setStatus("Browser run completed.", "ok");
      } catch (err) {
        setStatus("Browser run failed: " + err.message, "error");
      }
    });

    $("genPlan").addEventListener("click", async () => {
      try {
        setStatus("Generating plan...", "");
        const objective = $("objective").value || "Generate today's high-impact revenue plan.";
        const data = await api("/api/startup/generate-plan", {
          method: "POST",
          body: JSON.stringify({ objective }),
        });
        planText = String(data.plan || "").trim() || "No response.";
        renderPlan();
        setStatus("Plan generated.", "ok");
      } catch (err) {
        setStatus("Plan failed: " + err.message, "error");
      }
    });

    $("saveSettings").addEventListener("click", async () => {
      try {
        setStatus("Saving settings...", "");
        await saveSettings();
        await refresh(true);
        setStatus("Settings saved.", "ok");
      } catch (err) {
        setStatus("Save failed: " + err.message, "error");
      }
    });

    $("saveOutreach").addEventListener("click", async () => {
      try {
        setStatus("Saving outreach config...", "");
        const smtpPassword = $("smtpPassword").value;
        await api("/api/startup/outreach/config", {
          method: "POST",
          body: JSON.stringify({
            enabled: $("outreachEnabled").value === "true",
            fromName: $("fromName").value.trim(),
            fromEmail: $("fromEmail").value.trim(),
            replyTo: $("replyTo").value.trim(),
            smtpHost: $("smtpHost").value.trim(),
            smtpPort: Number($("smtpPort").value || 587),
            smtpUser: $("smtpUser").value.trim(),
            smtpSecure: $("smtpSecure").value === "true",
            batchSizePerRun: Number($("batchSizePerRun").value || 5),
            minMinutesBetweenSends: Number($("minMinutesBetweenSends").value || 2),
            minHoursBetweenMessages: Number($("minHoursBetweenMessages").value || 24),
            subjectTemplate: $("subjectTemplate").value.trim(),
            autoReplyEnabled: $("autoReplyEnabled").value === "true",
            autoReplyCooldownHours: Number($("autoReplyCooldownHours").value || 12),
            autoReplySubjectTemplate: $("autoReplySubjectTemplate").value.trim(),
            autoReplyTemplate: $("autoReplyTemplate").value.trim(),
            ...(smtpPassword ? { smtpPassword } : {}),
          }),
        });
        $("smtpPassword").value = "";
        await refresh(true);
        setStatus("Outreach config saved.", "ok");
      } catch (err) {
        setStatus("Outreach config failed: " + err.message, "error");
      }
    });

    $("saveCalling").addEventListener("click", async () => {
      try {
        setStatus("Saving calling config...", "");
        const vapiApiKey = $("vapiApiKey").value;
        await api("/api/startup/calling/config", {
          method: "POST",
          body: JSON.stringify({
            enabled: $("callingEnabled").value === "true",
            vapiAssistantId: $("vapiAssistantId").value.trim(),
            vapiPhoneNumberId: $("vapiPhoneNumberId").value.trim(),
            defaultCountryCode: $("callingDefaultCountryCode").value.trim(),
            batchSizePerRun: Number($("callingBatchSizePerRun").value || 5),
            minMinutesBetweenCalls: Number($("callingMinMinutesBetweenCalls").value || 2),
            minHoursBetweenCalls: Number($("callingMinHoursBetweenCalls").value || 24),
            fallbackToEmailWhenNoPhone: $("callingFallbackToEmailWhenNoPhone").value === "true",
            assistantDescription: $("callingAssistantDescription").value.trim(),
            firstMessage: $("callingFirstMessage").value.trim(),
            systemPrompt: $("callingSystemPrompt").value.trim(),
            scriptTemplate: $("callingScriptTemplate").value.trim(),
            ...(vapiApiKey ? { vapiApiKey } : {}),
          }),
        });
        $("vapiApiKey").value = "";
        await refresh(true);
        setStatus("Calling config saved.", "ok");
      } catch (err) {
        setStatus("Calling config failed: " + err.message, "error");
      }
    });

    $("saveBusiness").addEventListener("click", async () => {
      try {
        setStatus("Saving founder + browser settings...", "");
        await api("/api/startup/state", {
          method: "POST",
          body: JSON.stringify({
            business: {
              niche: $("businessNiche").value.trim(),
              offerName: $("businessOfferName").value.trim(),
              monthlyTargetGbp: Number($("businessMonthlyTargetGbp").value || 1000),
              monthlyPriceGbp: Number($("businessMonthlyPriceGbp").value || 299),
              setupFeeGbp: Number($("businessSetupFeeGbp").value || 199),
              clientsNeeded: Number($("businessClientsNeeded").value || 4),
              offerSummary: $("businessOfferSummary").value.trim(),
            },
            browserAgent: {
              enabled: $("browserEnabled").value === "true",
              headless: $("browserHeadless").value === "true",
              searchEngine: $("browserSearchEngine").value,
              maxActionsPerRun: Number($("browserMaxActionsPerRun").value || 20),
              humanDelayMinMs: Number($("browserHumanDelayMinMs").value || 900),
              humanDelayMaxMs: Number($("browserHumanDelayMaxMs").value || 2200),
              googlePlacesEnabled: $("googlePlacesEnabled").value === "true",
              googlePlacesLocation: $("googlePlacesLocation").value.trim(),
              googlePlacesMaxResults: Number($("googlePlacesMaxResults").value || 8),
              ...($("googlePlacesApiKey").value.trim() ? { googlePlacesApiKey: $("googlePlacesApiKey").value.trim() } : {}),
            },
          }),
        });
        $("googlePlacesApiKey").value = "";
        await refresh(true);
        setStatus("Founder + browser settings saved.", "ok");
      } catch (err) {
        setStatus("Founder + browser save failed: " + err.message, "error");
      }
    });

    $("runBrowserAgentNow").addEventListener("click", async () => {
      try {
        setStatus("Running browser agent...", "");
        await api("/api/startup/browser-agent/run", {
          method: "POST",
          body: JSON.stringify({
            reason: "mobile-manual-browser-run",
            goal: `Reach £${Number($("businessMonthlyTargetGbp").value || 1000)}/month fast`,
            plan: "Research local trade leads, extract public contact opportunities, and enrich each lead with review and business info",
          }),
        });
        await refresh(true);
        setStatus("Browser agent run completed.", "ok");
      } catch (err) {
        setStatus("Browser agent run failed: " + err.message, "error");
      }
    });

    $("runCallingNow").addEventListener("click", async () => {
      try {
        setStatus("Running calling now...", "");
        await api("/api/startup/calling/run", {
          method: "POST",
          body: JSON.stringify({ reason: "mobile-manual-calling" }),
        });
        await refresh(true);
        setStatus("Calling run completed.", "ok");
      } catch (err) {
        setStatus("Calling run failed: " + err.message, "error");
      }
    });

    $("sendOutreachNow").addEventListener("click", async () => {
      try {
        setStatus("Sending outreach now...", "");
        await api("/api/startup/outreach/send-now", {
          method: "POST",
          body: JSON.stringify({ reason: "mobile-send-now" }),
        });
        await refresh(true);
        setStatus("Outreach run completed.", "ok");
      } catch (err) {
        setStatus("Outreach run failed: " + err.message, "error");
      }
    });

    $("runAutoReplyNow").addEventListener("click", async () => {
      try {
        setStatus("Running auto-reply...", "");
        await api("/api/startup/replies/auto-run", {
          method: "POST",
          body: JSON.stringify({ reason: "mobile-manual-auto-reply" }),
        });
        await refresh(true);
        setStatus("Auto-reply run completed.", "ok");
      } catch (err) {
        setStatus("Auto-reply run failed: " + err.message, "error");
      }
    });

    $("enrichLeadsNow").addEventListener("click", async () => {
      try {
        setStatus("Enriching lead reviews/info...", "");
        await api("/api/startup/leads/enrich", {
          method: "POST",
          body: JSON.stringify({ reason: "mobile-manual-enrich" }),
        });
        await refresh(true);
        setStatus("Lead enrichment completed.", "ok");
      } catch (err) {
        setStatus("Lead enrichment failed: " + err.message, "error");
      }
    });

    $("captureReply").addEventListener("click", async () => {
      try {
        setStatus("Capturing reply + auto-reply...", "");
        await api("/api/startup/replies/intake", {
          method: "POST",
          body: JSON.stringify({
            fromEmail: $("replyFromEmail").value.trim(),
            subject: $("replySubject").value.trim(),
            text: $("replyText").value.trim(),
          }),
        });
        $("replyFromEmail").value = "";
        $("replySubject").value = "";
        $("replyText").value = "";
        await refresh(true);
        setStatus("Reply captured and auto-reply processed.", "ok");
      } catch (err) {
        setStatus("Reply intake failed: " + err.message, "error");
      }
    });

    $("leadForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      try {
        setStatus("Adding lead...", "");
        await api("/api/startup/leads", {
          method: "POST",
          body: JSON.stringify({
            name: $("leadName").value.trim(),
            email: $("leadEmail").value.trim(),
            phone: $("leadPhone").value.trim(),
            hasWebsite: $("leadHasWebsite").value ? $("leadHasWebsite").value === "true" : undefined,
            niche: $("leadNiche").value.trim(),
            valueUsd: Number($("leadValue").value || 0),
          }),
        });
        $("leadName").value = "";
        $("leadEmail").value = "";
        $("leadPhone").value = "";
        $("leadHasWebsite").value = "";
        $("leadNiche").value = "";
        $("leadValue").value = "";
        await refresh(true);
        setStatus("Lead added.", "ok");
      } catch (err) {
        setStatus("Add lead failed: " + err.message, "error");
      }
    });

    $("leads").addEventListener("change", async (event) => {
      const target = event.target;
      if (!target || !target.dataset || !target.dataset.leadStatus) return;
      try {
        await api("/api/startup/leads/" + encodeURIComponent(target.dataset.leadStatus) + "/status", {
          method: "POST",
          body: JSON.stringify({ status: target.value }),
        });
        await refresh(true);
        setStatus("Lead status saved.", "ok");
      } catch (err) {
        setStatus("Lead status failed: " + err.message, "error");
      }
    });

    refresh(false);
    setInterval(() => refresh(true), 30000);
  </script>
</body>
</html>
